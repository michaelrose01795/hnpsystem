name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Prepare Playwright auth directory
      run: mkdir -p e2e/.auth

    # Detect whether real Supabase secrets are configured. The `secrets` context
    # is not available in step `if`, so we probe via env into a step output.
    - name: Check for real DB secrets
      id: db-check
      env:
        SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_ANON: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      run: |
        if [ -n "$SERVICE_KEY" ] && [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
        fi

    # Smoke tests — always run.
    #
    # When real Supabase secrets are configured they are forwarded so smoke
    # tests exercise the same render path as production. When they are not,
    # we deliberately do NOT pass placeholder Supabase values; the client
    # detects PLAYWRIGHT_TEST_AUTH=1 with no real credentials and uses an
    # in-memory stub. Auth always uses the CI bypass (PLAYWRIGHT_TEST_AUTH=1
    # in src/lib/auth/devAuth.js).
    - name: Run smoke tests
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-not-for-production' }}
        NEXTAUTH_URL: http://localhost:3000
        PLAYWRIGHT_TEST_AUTH: '1'
      run: npx playwright test --project=auth-setup --project=smoke

    # Visual tests — update snapshots on every CI run so baselines stay current
    # with the Linux runner. The updated files are uploaded as a build artifact.
    - name: Run visual tests (update snapshots)
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-not-for-production' }}
        NEXTAUTH_URL: http://localhost:3000
        PLAYWRIGHT_TEST_AUTH: '1'
      run: npx playwright test --project=auth-setup --project=visual --update-snapshots

    # Workflow / integration tests — only run when real Supabase secrets are present.
    - name: Run workflow tests (requires real DB)
      if: steps.db-check.outputs.available == 'true'
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-not-for-production' }}
        NEXTAUTH_URL: http://localhost:3000
        PLAYWRIGHT_TEST_AUTH: '1'
      run: npx playwright test --project=auth-setup --project=workflows
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
